user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    # multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Logging Settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Virtual Host Configs
    server {
        listen 80;
        listen [::]:80;
        # Change this to your domain name if you have one
        server_name bananaprep.example.com;

        # For SSL redirection (if you set up HTTPS)
        # return 301 https://$host$request_uri;

        root /var/www/bananaprep/client;
        index index.html;

        # Serve static client files
        location / {
            try_files $uri $uri/ /index.html;
            expires 30d;
        }

        # Images and static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
            expires 30d;
        }

        # API proxy to Node.js server
        location /api/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Problems.json file - specific route for this file
        location /data/problems.json {
            alias /var/www/bananaprep/server/public/data/problems.json;
            add_header Cache-Control "public, max-age=3600";
        }

        # Error pages
        error_page 404 /404.html;
        location = /404.html {
            root /var/www/bananaprep/client;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/bananaprep/client;
        }
    }

    # HTTPS server (Uncomment after setting up SSL)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name bananaprep.example.com;
    # 
    #     ssl_certificate /etc/letsencrypt/live/bananaprep.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/bananaprep.example.com/privkey.pem;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_ciphers HIGH:!aNULL:!MD5:!kEDH;
    #     ssl_prefer_server_ciphers on;
    # 
    #     root /var/www/bananaprep/client;
    #     index index.html;
    # 
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #         expires 30d;
    #     }
    # 
